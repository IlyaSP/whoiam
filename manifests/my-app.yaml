---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami-argo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami-argo
  template:
    metadata:
      labels:
        app: whoami-argo
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /test
              port: 80
              scheme: HTTP
            initialDelaySeconds: 20
            timeoutSeconds: 1
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 20
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: whoami-argo
spec:
  ports:
    - port: 80
  selector:
    app: whoami-argo
