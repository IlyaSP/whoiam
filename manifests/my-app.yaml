---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami-argo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami-argo
  template:
    metadata:
      labels:
        app: whoami-argo
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: whoami-argo
spec:
  ports:
    - port: 80
  selector:
    app: whoami-argo
